{{- if and .Values.daemonset.enabled .Values.daemonset.autoscaling.enabled }}
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: "{{ template "certExporter.daemonset.name" . }}"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "certExporter.daemonset.labels" . | nindent 4 }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: DaemonSet
    name: "{{ template "certExporter.daemonset.name" . }}"
  resourcePolicy:
    containerPolicies:
    - containerName: cert-exporter
      controlledValues: RequestsAndLimits
      mode: Auto
      minAllowed: {{- toYaml .Values.daemonset.resources.requests | nindent 8 }}
  updatePolicy:
    updateMode: Auto
{{- end }}
